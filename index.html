<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DaanVeda — Self Onboarding Portal</title>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Inter,system-ui,sans-serif;font-size:14px;background:#f8fafc;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}

  /* ─ Header ─ */
  #header{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
  .logo{width:34px;height:34px;background:#3B82F6;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .logo-text{line-height:1}
  .logo-text div:first-child{font-weight:700;font-size:14px}
  .logo-text div:last-child{color:#93C5FD;font-size:10px}
  #progress-wrap{text-align:right}
  #progress-wrap .lbl{color:#93C5FD;font-size:10px;margin-bottom:3px}
  .prog-row{display:flex;align-items:center;gap:8px}
  .prog-bar-outer{width:110px;height:6px;background:#1e3a5f;border-radius:4px;overflow:hidden}
  .prog-bar-inner{height:6px;background:#60A5FA;border-radius:4px;transition:width .35s}
  #prog-pct{font-weight:700;font-size:14px}
  #user-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);padding:6px 12px;border-radius:8px;color:white;font-size:12px;font-weight:500}
  #user-btn .role-pill{background:#3B82F6;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
  #badge-count{background:#D97706;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;color:white;white-space:nowrap}

  /* ─ Tabs ─ */
  #tabs{background:white;border-bottom:1px solid #e2e8f0;display:flex;flex-shrink:0;overflow-x:auto}
  .tab-btn{padding:11px 18px;font-size:12px;font-weight:500;color:#64748b;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .15s}
  .tab-btn.active{color:#3B82F6;font-weight:700;border-bottom-color:#3B82F6}
  .mcq-score-pill{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:700;margin-left:3px}

  /* ─ Body ─ */
  #body{display:flex;flex:1;overflow:hidden}

  /* ─ Sidebar ─ */
  #sidebar{width:196px;background:white;border-right:1px solid #e2e8f0;overflow-y:auto;flex-shrink:0}
  .sidebar-section{padding:10px 12px 4px;font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.08em;text-transform:uppercase}
  .day-item{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
  .day-item:hover{background:#f8fafc}
  .day-item.active{border-left-color:#3B82F6;background:#EFF6FF}
  .day-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid #e2e8f0;transition:all .2s}
  .day-meta{flex:1;min-width:0}
  .day-meta .d-label{font-size:10px;font-weight:700;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .day-meta .d-title{font-size:10px;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .day-mini-bar{margin-top:3px;height:3px;background:#e2e8f0;border-radius:4px;overflow:hidden;display:none}
  .day-mini-fill{height:3px;background:#60A5FA;border-radius:4px}
  .badge-dot{font-size:12px}

  /* ─ Main content ─ */
  #main{flex:1;overflow-y:auto;padding:20px}

  /* ─ Cards ─ */
  .card{background:white;border-radius:12px;border:1px solid #e2e8f0;padding:18px;margin-bottom:14px}
  .card-sm{background:white;border-radius:10px;border:1px solid #e2e8f0;padding:14px;margin-bottom:10px}

  /* ─ Day header ─ */
  #day-header{border-radius:12px;border-width:1px;border-style:solid;padding:18px;margin-bottom:16px}
  .dh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
  .dh-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .dh-title{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:3px}
  .dh-subtitle{font-size:12px;color:#475569}
  .dh-pct{font-size:30px;font-weight:800;line-height:1}
  .dh-pct-lbl{font-size:10px;color:#64748b;margin-top:2px;text-align:right}
  .dh-bar{margin-top:12px;height:6px;background:rgba(0,0,0,0.08);border-radius:4px;overflow:hidden}
  .dh-bar-fill{height:6px;border-radius:4px;transition:width .3s}
  .dh-tip{margin-top:12px;padding:9px 12px;background:rgba(255,255,255,0.7);border-radius:8px;font-size:11px;color:#334155;border-left-width:3px;border-left-style:solid}

  /* ─ Two column layout ─ */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:700px){.two-col{grid-template-columns:1fr}}

  /* ─ Tasks ─ */
  .tasks-header{font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:13px}
  .tasks-count{font-size:10px;background:#F1F5F9;color:#64748b;padding:2px 8px;border-radius:20px;font-weight:600}
  .task-row{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none}
  .task-row:hover{background:#f8fafc}
  .task-row.done{background:#F0FDF4;border-color:#BBF7D0}
  .task-circle{width:20px;height:20px;border-radius:50%;border:2px solid #CBD5E1;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;font-size:10px;font-weight:700;color:white}
  .task-row.done .task-circle{background:#22C55E;border-color:#22C55E}
  .task-text{font-size:12px;color:#334155;line-height:1.45}
  .task-row.done .task-text{text-decoration:line-through;color:#94A3B8}
  .cc-pill{margin-left:5px;font-size:9px;background:#FEF3C7;color:#92400E;padding:1px 5px;border-radius:10px;font-weight:600;text-decoration:none}

  /* ─ KPIs ─ */
  .kpi-row{padding:9px 11px;border-radius:8px;margin-bottom:7px;border:1px solid #E2E8F0;background:#F8FAFC}
  .kpi-row.star-kpi{background:#FEFCE8;border-color:#FDE68A}
  .kpi-top{display:flex;align-items:center;gap:5px;margin-bottom:2px}
  .kpi-label{font-weight:600;font-size:11px;color:#1e293b}
  .kpi-desc{font-size:10px;color:#64748b}
  .star-icon{font-size:12px}

  /* ─ Resources in day ─ */
  .res-mini{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;margin-bottom:3px;background:#F8FAFC}
  .res-mini-icon{font-size:14px}
  .res-mini-name{flex:1;font-size:11px;font-weight:500;color:#334155}
  .res-mini-action{font-size:10px;color:#3B82F6;font-weight:500;flex-shrink:0}

  /* ─ Badge card ─ */
  .badge-card{padding:14px;border-radius:12px;display:flex;align-items:center;gap:12px;border:2px dashed #CBD5E1;background:#F8FAFC;transition:all .2s}
  .badge-card.earned{border-style:solid}
  .badge-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:#E2E8F0;border:2px solid #CBD5E1;transition:all .2s}
  .badge-info .badge-status{font-size:11px;font-weight:700;margin-bottom:2px}
  .badge-info .badge-name{font-size:12px;font-weight:700;color:#1e293b}
  .badge-info .badge-desc{font-size:10px;color:#94A3B8;margin-top:1px}

  /* ─ MCQ prompt banner ─ */
  .mcq-banner{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:14px}
  .mcq-banner-left .t{font-weight:700;color:#1D4ED8;margin-bottom:3px;font-size:13px}
  .mcq-banner-left .s{font-size:11px;color:#3B82F6}
  .mcq-banner-left .r{font-size:12px;font-weight:700;margin-top:4px}
  .btn-primary{padding:9px 18px;border-radius:8px;border:none;background:#3B82F6;color:white;font-weight:700;font-size:12px;white-space:nowrap}
  .btn-secondary{padding:9px 18px;border-radius:8px;border:1px solid #e2e8f0;background:white;color:#334155;font-weight:600;font-size:12px}

  /* ─ Resources Tab ─ */
  .res-tab-title{font-size:20px;font-weight:700;margin-bottom:4px}
  .res-tab-sub{color:#64748b;font-size:12px;margin-bottom:20px}
  .res-cat-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;margin-top:20px}
  .res-cat-name{font-weight:700;font-size:13px}
  .res-cat-count{font-size:10px;background:#EFF6FF;color:#2563EB;padding:2px 9px;border-radius:20px;font-weight:600}
  .res-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  @media(max-width:600px){.res-grid{grid-template-columns:1fr}}
  .res-card{background:white;border:1px solid #e2e8f0;border-radius:10px;padding:13px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:all .15s}
  .res-card:hover{background:#f8fafc}
  .res-card.accessed{background:#F0FDF4;border-color:#BBF7D0}
  .res-check{width:22px;height:22px;border-radius:50%;border:2px solid #CBD5E1;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:10px;font-weight:700;color:white;transition:all .15s}
  .res-card.accessed .res-check{background:#22C55E;border-color:#22C55E}
  .res-card-icon{font-size:15px}
  .res-card-name{font-weight:600;font-size:12px;color:#1e293b;margin-bottom:3px}
  .res-card.accessed .res-card-name{color:#15803D}
  .res-card-desc{font-size:10px;color:#64748b;margin-bottom:4px;line-height:1.4}
  .res-card-action{font-size:10px;color:#3B82F6;font-weight:600}

  /* ─ Badges Tab ─ */
  .badges-title{font-size:20px;font-weight:700;margin-bottom:4px}
  .badges-sub{color:#64748b;font-size:12px;margin-bottom:20px}
  .badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:600px){.badges-grid{grid-template-columns:repeat(2,1fr)}}
  .badge-tile{border-radius:12px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;border:1px solid #e2e8f0;background:#f8fafc;transition:all .2s;opacity:.55}
  .badge-tile.earned{opacity:1}
  .badge-tile-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:#E2E8F0;border:2px solid #CBD5E1;transition:all .2s}
  .badge-tile-name{font-size:11px;font-weight:700;color:#64748b}
  .badge-tile.earned .badge-tile-name{color:inherit}
  .badge-tile-desc{font-size:10px;color:#94A3B8;line-height:1.4}
  .earned-pill{font-size:9px;background:white;color:#16A34A;font-weight:700;padding:2px 9px;border-radius:20px;border:1px solid #BBF7D0}
  .manager-note{font-size:10px;color:#94A3B8;font-style:italic}

  /* ─ MCQ Tab ─ */
  .mcq-title{font-size:20px;font-weight:700;margin-bottom:4px}
  .mcq-sub{color:#64748b;font-size:12px;margin-bottom:18px}
  .mcq-result{border-radius:12px;padding:18px;margin-bottom:20px;display:flex;align-items:center;gap:18px}
  .mcq-result-score{font-size:38px;font-weight:800;line-height:1}
  .mcq-result-msg{font-weight:700;font-size:14px;margin-bottom:3px}
  .mcq-result-detail{color:#64748b;font-size:12px}
  .retry-btn{margin-top:7px;font-size:11px;color:#3B82F6;background:none;border:none;cursor:pointer;font-weight:700;padding:0;text-decoration:underline}
  .q-card{background:white;border-radius:10px;border:1px solid #e2e8f0;padding:16px;margin-bottom:12px}
  .q-num{width:24px;height:24px;border-radius:50%;background:#EFF6FF;color:#1D4ED8;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .q-text{font-weight:600;font-size:12px;line-height:1.5;color:#1e293b}
  .q-opts{padding-left:34px;margin-top:10px}
  .opt-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;margin-bottom:5px;cursor:pointer;border:1px solid #E2E8F0;background:#F8FAFC;transition:all .1s;font-size:12px;color:#334155}
  .opt-row:hover{background:#EFF6FF;border-color:#BFDBFE}
  .opt-row.selected{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}
  .opt-row.correct{background:#F0FDF4;border-color:#86EFAC;color:#15803D}
  .opt-row.wrong{background:#FEF2F2;border-color:#FECACA;color:#991B1B}
  .opt-circle{width:17px;height:17px;border-radius:50%;border:2px solid #CBD5E1;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:700;color:white;transition:all .15s}
  .opt-row.selected .opt-circle{background:#3B82F6;border-color:#3B82F6}
  .opt-row.correct .opt-circle{background:#22C55E;border-color:#22C55E}
  .opt-row.wrong .opt-circle{background:#EF4444;border-color:#EF4444}
  #submit-mcq{width:100%;padding:13px;border-radius:10px;background:#3B82F6;color:white;font-weight:700;font-size:13px;border:none;margin-top:4px;margin-bottom:24px;transition:background .15s}
  #submit-mcq:hover{background:#2563EB}
  #submit-mcq:disabled{background:#CBD5E1;cursor:not-allowed}

  /* ─ Setup Modal ─ */
  #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:999}
  .modal-box{background:white;border-radius:16px;padding:28px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .modal-title{font-size:20px;font-weight:700;margin-bottom:3px}
  .modal-sub{color:#64748b;font-size:12px;margin-bottom:22px}
  .modal-label{display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
  .modal-input{width:100%;padding:10px 13px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;outline:none;transition:border .15s}
  .modal-input:focus{border-color:#3B82F6}
  .role-btns{display:flex;gap:7px;margin-bottom:24px}
  .role-btn{flex:1;padding:9px 0;border-radius:8px;border:2px solid #e2e8f0;background:white;color:#475569;font-weight:600;font-size:12px;cursor:pointer;transition:all .15s}
  .role-btn.active{border-color:#3B82F6;background:#EFF6FF;color:#1D4ED8}
  #save-setup{width:100%;padding:11px;border-radius:8px;background:#3B82F6;color:white;font-weight:700;font-size:13px;border:none;transition:background .15s}
  #save-setup:hover{background:#2563EB}
  #save-setup:disabled{background:#CBD5E1;cursor:not-allowed}

  /* ─ Scrollbar ─ */
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

  /* ─ Auth Modal ─ */
  #auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:1000}
  .auth-box{background:white;border-radius:16px;padding:28px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .auth-title{font-size:20px;font-weight:700;margin-bottom:3px}
  .auth-sub{color:#64748b;font-size:12px;margin-bottom:22px}
  .auth-label{display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
  .auth-input{width:100%;padding:10px 13px;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;outline:none;transition:border .15s;margin-bottom:16px}
  .auth-input:focus{border-color:#3B82F6}
  #auth-btn{width:100%;padding:11px;border-radius:8px;background:#3B82F6;color:white;font-weight:700;font-size:13px;border:none;cursor:pointer;transition:background .15s}
  #auth-btn:hover:not(:disabled){background:#2563EB}
  #auth-btn:disabled{background:#CBD5E1;cursor:not-allowed}
  #auth-error{color:#DC2626;font-size:11px;margin-bottom:10px;display:none;padding:8px 10px;background:#FEF2F2;border-radius:6px;border:1px solid #FECACA}
  #auth-status{text-align:center;font-size:11px;color:#94A3B8;margin-top:10px;min-height:16px}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div style="display:flex;align-items:center;gap:11px">
    <div class="logo">DV</div>
    <div class="logo-text">
      <div>DaanVeda</div>
      <div>Self-Onboarding Portal</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end">
    <div id="progress-wrap">
      <div class="lbl">Overall Progress</div>
      <div class="prog-row">
        <div class="prog-bar-outer"><div class="prog-bar-inner" id="prog-bar" style="width:0%"></div></div>
        <span id="prog-pct">0%</span>
      </div>
    </div>
    <button id="user-btn" onclick="openSetup()">
      <span id="user-name-lbl">Set your name</span>
      <span class="role-pill" id="user-role-lbl">SDR</span>
    </button>
    <div id="badge-count">🏅 0/9</div>
  </div>
</div>

<!-- Tabs -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('timeline')" id="tab-timeline">🗓️ Journey</button>
  <button class="tab-btn" onclick="switchTab('resources')" id="tab-resources">📦 Resources</button>
  <button class="tab-btn" onclick="switchTab('badges')" id="tab-badges">🏅 Badges</button>
  <button class="tab-btn" onclick="switchTab('mcq')" id="tab-mcq">📝 Knowledge Test</button>
</div>

<!-- Body -->
<div id="body">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-section">Your Journey</div>
    <div id="sidebar-days"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="tab-timeline-content"></div>
    <div id="tab-resources-content" style="display:none"></div>
    <div id="tab-badges-content" style="display:none"></div>
    <div id="tab-mcq-content" style="display:none"></div>
  </div>
</div>

<!-- Setup Modal (name + role) -->
<div id="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">Welcome to DaanVeda 🚀</div>
    <div class="modal-sub">Let's personalise your onboarding journey.</div>
    <label class="modal-label">Your Name</label>
    <input id="name-input" class="modal-input" placeholder="e.g. Arjun Mehta" style="margin-bottom:16px" oninput="document.getElementById('save-setup').disabled=!this.value.trim()">
    <label class="modal-label" style="margin-top:4px">Your Role</label>
    <div class="role-btns">
      <button class="role-btn active" onclick="selectRole('SDR',this)">SDR</button>
      <button class="role-btn" onclick="selectRole('Closer',this)">Closer</button>
      <button class="role-btn" onclick="selectRole('Cold Caller',this)">Cold Caller</button>
    </div>
    <button id="save-setup" disabled onclick="saveSetup()">Start My Onboarding →</button>
  </div>
</div>

<!-- Auth Modal (email login) -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-title">Sign In to DaanVeda 🔐</div>
    <div class="auth-sub">Enter your work email to access your onboarding portal.</div>
    <label class="auth-label">Work Email</label>
    <input id="auth-email" class="auth-input" type="email" placeholder="you@daanveda.com"
      onkeydown="if(event.key==='Enter')handleAuth()">
    <div id="auth-error"></div>
    <button id="auth-btn" onclick="handleAuth()">Continue →</button>
    <div id="auth-status"></div>
  </div>
</div>

<script>
// ─── SUPABASE INIT ────────────────────────────────────────────────────────────

const SUPABASE_URL = 'https://gjpkzxczwftazefqoddj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_ZtF3cRJ8UPwZd9v3JwRbhg_L-UCEDYM';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── DATA ───────────────────────────────────────────────────────────────────

const TYPE_META={
  setup:{bg:"#EEF4FF",border:"#B8D0FB",text:"#2D5FA6",dot:"#4A7FD4"},

// ─── STATE ──────────────────────────────────────────────────────────────────

const STORAGE_KEY='dv_onboarding_v3';
let state={
  repName:'',role:'SDR',activeDay:0,currentTab:'timeline',
  completedTasks:{},mcqAnswers:{},mcqSubmitted:false,resourcesChecked:{},
  selectedRole:'SDR'
};

// ─── STORAGE: localStorage (fallback) ────────────────────────────────────────

function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}
  saveToSupabase(); // also persist to Supabase (fire-and-forget)
}

function load(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)Object.assign(state,JSON.parse(d));}catch(e){}
}

// ─── STORAGE: Supabase ────────────────────────────────────────────────────────

async function saveToSupabase(){
  try{
    const { data:{ user } } = await supabaseClient.auth.getUser();
    if(!user) return;
    await supabaseClient.from('user_progress').upsert({
      user_id: user.id,
      name: state.repName,
      role: state.role,
      completed_tasks: state.completedTasks,
      overall_progress: overallPct(),
      mcq_score: mcqPct()
    });
  }catch(e){ console.warn('Supabase save error:',e); }
}

async function loadFromSupabase(){
  try{
    const { data:{ user } } = await supabaseClient.auth.getUser();
    if(!user) return;
    const { data } = await supabaseClient
      .from('user_progress')
      .select('*')
      .eq('user_id', user.id)
      .single();
    if(data){
      if(data.name) state.repName = data.name;
      if(data.role) state.role = data.role;
      if(data.completed_tasks) state.completedTasks = data.completed_tasks;
    }
  }catch(e){ console.warn('Supabase load error:',e); }
}

// ─── AUTH ────────────────────────────────────────────────────────────────────

async function handleAuth(){
  const email = document.getElementById('auth-email').value.trim();
  if(!email){ showAuthError('Please enter your email address.'); return; }

  const btn    = document.getElementById('auth-btn');
  const status = document.getElementById('auth-status');
  const errEl  = document.getElementById('auth-error');

  btn.disabled = true;
  btn.textContent = 'Please wait…';
  errEl.style.display = 'none';
  errEl.textContent = '';
  status.textContent = 'Signing in…';

  // Attempt sign-in first
  let { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: '123456'
  });

  // If credentials invalid → new user → sign up
  if(error && (error.message.toLowerCase().includes('invalid login') || error.message.toLowerCase().includes('invalid credentials'))){
    status.textContent = 'Creating your account…';
    const { data: signUpData, error: signUpErr } = await supabaseClient.auth.signUp({
      email,
      password: '123456'
    });
    if(signUpErr){
      showAuthError(signUpErr.message);
      btn.disabled = false;
      btn.textContent = 'Continue →';
      status.textContent = '';
      return;
    }
    data = signUpData;
  } else if(error){
    showAuthError(error.message);
    btn.disabled = false;
    btn.textContent = 'Continue →';
    status.textContent = '';
    return;
  }

  // Auth succeeded — load data and launch app
  status.textContent = 'Loading your progress…';
  load();               // localStorage first
  await loadFromSupabase(); // Supabase overwrites (source of truth)
  document.getElementById('auth-overlay').style.display = 'none';
  initApp();
}

function showAuthError(msg){
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ─── APP INIT ─────────────────────────────────────────────────────────────────

function initApp(){
  _pendingRole = state.role;
  if(!state.repName){
    document.getElementById('modal-overlay').style.display = 'flex';
  } else {
    document.getElementById('modal-overlay').style.display = 'none';
  }
  render();
  switchTab(state.currentTab || 'timeline');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function dayTasks(day){return day.tasks.filter(t=>!t.coldCallerOnly||state.role==='Cold Caller');}
function dayDone(day){const t=dayTasks(day);return t.length?t.filter(t=>state.completedTasks[t.id]).length:0;}
function dayPct(day){const t=dayTasks(day);return t.length?Math.round(dayDone(day)/t.length*100):0;}

function earnedBadges(){
  const e=new Set();
  if(dayPct(DAYS[0])===100)e.add('setup_hero');
  if(dayPct(DAYS[1])===100&&state.mcqSubmitted&&mcqPct()>=80)e.add('fundraising_scholar');
  if(dayPct(DAYS[2])===100)e.add('product_pro');
  if(dayPct(DAYS[3])===100)e.add('shadow_champion');
  if(dayPct(DAYS[4])===100)e.add('showcase_star');
  if(dayPct(DAYS[5])===100)e.add('strategist');
  if(dayPct(DAYS[6])===100)e.add('data_hunter');
  if(dayPct(DAYS[8])===100)e.add('certified_rep');
  if(dayPct(DAYS[10])===100)e.add('first_execution');
  return e;
}

function mcqScore(){return MCQ.filter(q=>state.mcqAnswers[q.id]===q.correct).length;}
function mcqPct(){return Math.round(mcqScore()/MCQ.length*100);}

function overallPct(){
  const all=DAYS.flatMap(d=>dayTasks(d));
  return all.length?Math.round(all.filter(t=>state.completedTasks[t.id]).length/all.length*100):0;
}

function resById(id){return RESOURCES.find(r=>r.id===id);}
function badgeById(id){return BADGES.find(b=>b.id===id);}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render(){
  renderHeader();
  renderSidebar();
  renderTimeline();
  renderResources();
  renderBadges();
  renderMcq();
}

function renderHeader(){
  document.getElementById('user-name-lbl').textContent=state.repName||'Set your name';
  document.getElementById('user-role-lbl').textContent=state.role;
  const pct=overallPct();
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  const eb=earnedBadges();
  const nonMgr=BADGES.filter(b=>!b.managerAwarded).length;
  document.getElementById('badge-count').textContent='🏅 '+eb.size+'/'+nonMgr;
  // mcq tab pill
  const mcqTab=document.getElementById('tab-mcq');
  const oldPill=mcqTab.querySelector('.mcq-score-pill');
  if(oldPill)oldPill.remove();
  if(state.mcqSubmitted){
    const p=mcqPct();
    const pill=document.createElement('span');
    pill.className='mcq-score-pill';
    pill.style.background=p>=80?'#DCFCE7':'#FEE2E2';
    pill.style.color=p>=80?'#166534':'#991B1B';
    pill.textContent=p+'%';
    mcqTab.appendChild(pill);
  }
}

function renderSidebar(){
  const eb=earnedBadges();
  const el=document.getElementById('sidebar-days');
  el.innerHTML='';
  DAYS.forEach((day,idx)=>{
    const pct=dayPct(day);
    const tm=TYPE_META[day.type];
    const active=state.activeDay===idx;
    const div=document.createElement('div');
    div.className='day-item'+(active?' active':'');
    div.onclick=()=>{state.activeDay=idx;save();render();};

    let iconStyle=`background:${pct===100?'#DCFCE7':tm.bg};border-color:${pct===100?'#86EFAC':tm.border}`;
    div.innerHTML=`
      <div class="day-icon" style="${iconStyle}">${pct===100?'✓':day.emoji}</div>
      <div class="day-meta">
        <div class="d-label" style="color:${active?'#1D4ED8':'#475569'}">${day.label}</div>
        <div class="d-title">${day.title}</div>
        ${pct>0&&pct<100?`<div class="day-mini-bar" style="display:block"><div class="day-mini-fill" style="width:${pct}%"></div></div>`:''}
      </div>
      ${day.badgeId&&eb.has(day.badgeId)?'<span class="badge-dot">🏅</span>':''}
    `;
    el.appendChild(div);
  });
}

function renderTimeline(){
  const day=DAYS[state.activeDay];
  const tm=TYPE_META[day.type];
  const eb=earnedBadges();
  const pct=dayPct(day);
  const done=dayDone(day);

    const earned=eb.has(day.badgeId);

      <div class="badge-avatar" style="${earned?`background:${b.color};border-color:${b.borderColor}`:''}">${earned?b.emoji:'🔒'}</div>
      <div class="badge-info">
        <div class="badge-status" style="color:${earned?b.textColor:'#94A3B8'}">${earned?'Badge Earned!':'Badge Available'}</div>
        <div class="badge-name" style="${earned?`color:${b.textColor}`:''}">${b.name}</div>

    el.innerHTML=`<div style="max-width:680px">
      ${headerHtml}

          <!-- Sky background -->

          <!-- Stars / z's floating -->
          <text x="280" y="60" font-size="22" fill="#A5B4FC" opacity="0.8" font-family="serif">Z</text>
          <text x="310" y="38" font-size="16" fill="#C4B5FD" opacity="0.6" font-family="serif">z</text>
          <text x="335" y="55" font-size="12" fill="#DDD6FE" opacity="0.5" font-family="serif">z</text>
          <!-- Moon -->
          <circle cx="340" cy="50" r="30" fill="#FEF08A"/>
          <circle cx="352" cy="42" r="24" fill="#F0F9FF"/>
          <!-- Cloud 1 -->
          <ellipse cx="80" cy="55" rx="40" ry="22" fill="white"/>
          <ellipse cx="55" cy="60" rx="25" ry="18" fill="white"/>
          <ellipse cx="108" cy="62" rx="28" ry="16" fill="white"/>
          <!-- Cloud 2 small -->
          <ellipse cx="200" cy="35" rx="28" ry="14" fill="white" opacity="0.7"/>
          <ellipse cx="180" cy="40" rx="18" ry="11" fill="white" opacity="0.7"/>
          <!-- Bed base -->
          <rect x="60" y="170" width="280" height="20" rx="4" fill="#6366F1"/>
          <!-- Mattress -->
          <rect x="65" y="145" width="270" height="35" rx="8" fill="#E0E7FF"/>
          <!-- Pillow -->
          <rect x="70" y="140" width="70" height="25" rx="10" fill="white" stroke="#C7D2FE" stroke-width="1.5"/>
          <!-- Blanket -->
          <rect x="65" y="155" width="270" height="30" rx="6" fill="#818CF8"/>
          <rect x="65" y="155" width="270" height="12" rx="6" fill="#6366F1"/>
          <!-- Bedposts -->
          <rect x="62" y="140" width="14" height="55" rx="4" fill="#4338CA"/>
          <rect x="324" y="140" width="14" height="55" rx="4" fill="#4338CA"/>
          <!-- Head -->
          <circle cx="120" cy="133" r="22" fill="#FBBF24"/>
          <!-- Sleeping face -->
          <path d="M110 135 Q120 140 130 135" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M112 128 Q115 126 118 128" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M122 128 Q125 126 128 128" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- Hair little tufts -->
          <path d="M110 116 Q108 108 115 112" stroke="#92400E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M120 113 Q120 105 125 110" stroke="#92400E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <!-- Lamp -->
          <rect x="320" y="155" width="8" height="40" fill="#D1D5DB"/>
          <polygon points="308,155 340,155 330,130 318,130" fill="#FDE68A" stroke="#F59E0B" stroke-width="1"/>
          <ellipse cx="324" cy="155" rx="16" ry="4" fill="#FDE68A" opacity="0.5"/>

        <div style="font-size:22px;font-weight:700;color:#4338CA;margin-bottom:8px">Complete Rest. No Tasks. No Tracker.</div>

          You've spent 13 days learning, shadowing, building, and executing.<br>
          Today the only instruction is: <strong style="color:#4338CA">switch off</strong>.<br><br>
          Sleep well. Eat well. Do something you enjoy.<br>
          Tomorrow, you go live. 🚀

  // mcq prompt

    mcqBanner=`<div class="mcq-banner">
      <div class="mcq-banner-left">
        <div class="t">Knowledge Test Required</div>
        <div class="s">Pass the MCQ with ≥80% to unlock the Fundraising Scholar badge.</div>
        ${resultLine}
      </div>
      <button class="btn-primary" onclick="switchTab('mcq')">${state.mcqSubmitted?'Review Test':'Take Test →'}</button>
    </div>`;
  }

  el.innerHTML=`
    <div style="max-width:760px">
      ${headerHtml}
      <div class="two-col">
        ${tasksHtml}
        <div>${kpiHtml}${resHtml}${badgeHtml}</div>

}

function renderResources(){
  const cats=[...new Set(RESOURCES.map(r=>r.cat))];
  let html='<div style="max-width:800px"><div class="res-tab-title">Resource Collaterals</div><div class="res-tab-sub">Everything you need across the 15-day journey. Click each to mark as accessed.</div>';
  cats.forEach(cat=>{
    const items=RESOURCES.filter(r=>r.cat===cat);
    const checked=items.filter(r=>state.resourcesChecked[r.id]).length;
    html+=`<div class="res-cat-header"><div class="res-cat-name">${cat}</div><span class="res-cat-count">${checked}/${items.length} accessed</span></div>`;
    html+='<div class="res-grid">';
    items.forEach(r=>{
      const isChecked=!!state.resourcesChecked[r.id];
      html+=`<div class="res-card${isChecked?' accessed':''}" onclick="toggleResource('${r.id}')">
        <div class="res-check">${isChecked?'✓':''}</div>
        <div>
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
            <span class="res-card-icon">${r.icon}</span>
            <span class="res-card-name">${r.name}</span>
          </div>
          <div class="res-card-desc">${r.desc}</div>
          <div class="res-card-action">${r.action}</div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('tab-resources-content').innerHTML=html;
}

function renderBadges(){
  const eb=earnedBadges();
  const nonMgr=BADGES.filter(b=>!b.managerAwarded).length;
  let html=`<div style="max-width:680px"><div class="badges-title">Your Badges</div><div class="badges-sub">${eb.size} of ${nonMgr} earned (+ 1 manager-awarded). Complete each phase to unlock.</div><div class="badges-grid">`;
  BADGES.forEach(b=>{
    const earned=eb.has(b.id);
    html+=`<div class="badge-tile${earned?' earned':''}" style="${earned?`background:${b.color};border-color:${b.borderColor};border-width:1px;border-style:solid`:''}">
      <div class="badge-tile-avatar" style="${earned?`background:${b.color};border-color:${b.borderColor}`:''}">${earned?b.emoji:'🔒'}</div>
      <div class="badge-tile-name" style="${earned?`color:${b.textColor}`:''}">${b.name}</div>
      <div class="badge-tile-desc">${b.managerAwarded?'Manager-awarded badge':b.desc}</div>
      ${earned?'<div class="earned-pill">Earned ✓</div>':''}
      ${b.managerAwarded&&!earned?'<div class="manager-note">Ask your manager</div>':''}
    </div>`;
  });
  html+='</div></div>';
  document.getElementById('tab-badges-content').innerHTML=html;
}

function renderMcq(){
  const p=mcqPct();
  const sc=mcqScore();
  let resultHtml='';
  if(state.mcqSubmitted){
    resultHtml=`<div class="mcq-result" style="background:${p>=80?'#F0FDF4':'#FEF2F2'};border:1px solid ${p>=80?'#86EFAC':'#FECACA'}">
      <div class="mcq-result-score" style="color:${p>=80?'#16A34A':'#DC2626'}">${p}%</div>
      <div>
        <div class="mcq-result-msg" style="color:${p>=80?'#15803D':'#991B1B'}">${p>=80?'Passed! Fundraising Scholar badge unlocked.':'Not quite — you need 80% to pass.'}</div>
        <div class="mcq-result-detail">${sc} of ${MCQ.length} correct</div>
        ${p<80?'<button class="retry-btn" onclick="retryMcq()">Retry test →</button>':''}
      </div>
    </div>`;
  }

  let qHtml='';
  MCQ.forEach((q,qi)=>{
    const sel=state.mcqAnswers[q.id];
    qHtml+=`<div class="q-card">
      <div style="display:flex;gap:9px;margin-bottom:2px">
        <div class="q-num">${qi+1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="q-opts">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt-row';
      let cirContent='';
      if(state.mcqSubmitted){
        if(oi===q.correct){cls+=' correct';cirContent='✓';}
        else if(sel===oi){cls+=' wrong';cirContent='✗';}
      } else if(sel===oi){cls+=' selected';cirContent='●';}
      const onclick=state.mcqSubmitted?'':'onclick="selectOpt(\''+q.id+'\','+oi+')"';
      qHtml+=`<div class="${cls}" ${onclick} style="${state.mcqSubmitted?'cursor:default':''}">
        <div class="opt-circle">${cirContent}</div>
        <span>${opt}</span>
      </div>`;
    });
    qHtml+='</div></div>';
  });

  let submitHtml=!state.mcqSubmitted?'<button id="submit-mcq" onclick="submitMcq()">Submit Test →</button>':'';

  document.getElementById('tab-mcq-content').innerHTML=`
    <div style="max-width:640px">
      <div class="mcq-title">Knowledge Test</div>
      <div class="mcq-sub">10 questions on fundraising and sales. Score ≥80% to earn the Fundraising Scholar badge.</div>
      ${resultHtml}
      ${qHtml}
      ${submitHtml}
    </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────

function switchTab(tab){
  state.currentTab=tab;
  ['timeline','resources','badges','mcq'].forEach(t=>{
    document.getElementById('tab-'+t+'-content').style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  save();
  renderHeader();
}

function toggleTask(id){
  state.completedTasks[id]=!state.completedTasks[id];
  save();render();
}

function toggleResource(id){
  state.resourcesChecked[id]=!state.resourcesChecked[id];
  save();render();
}

function selectOpt(qid,oi){
  if(state.mcqSubmitted)return;
  state.mcqAnswers[qid]=oi;
  save();renderMcq();
}

function submitMcq(){
  if(Object.keys(state.mcqAnswers).length<MCQ.length){alert('Please answer all '+MCQ.length+' questions before submitting.');return;}
  state.mcqSubmitted=true;
  save();render();
}

function retryMcq(){
  state.mcqSubmitted=false;
  state.mcqAnswers={};
  save();render();
}

// ─── SETUP MODAL ─────────────────────────────────────────────────────────────

let _pendingRole='SDR';

function selectRole(r,btn){
  _pendingRole=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function openSetup(){
  _pendingRole=state.role;
  document.getElementById('name-input').value=state.repName;
  document.getElementById('save-setup').disabled=!state.repName.trim();
  document.querySelectorAll('.role-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent.trim()===state.role);
  });
  document.getElementById('modal-overlay').style.display='flex';
}

function saveSetup(){
  const name=document.getElementById('name-input').value.trim();
  if(!name)return;
  state.repName=name;
  state.role=_pendingRole;
  save();
  document.getElementById('modal-overlay').style.display='none';
  render();
}

document.getElementById('name-input').addEventListener('input',function(){
  document.getElementById('save-setup').disabled=!this.value.trim();
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
// Check for an existing Supabase session. If one exists, skip the auth modal
// and go straight into the app with the user's saved data.

(async function boot(){
  try{
    const { data:{ session } } = await supabaseClient.auth.getSession();
    if(session){
      document.getElementById('auth-overlay').style.display = 'none';
      load();                   // localStorage baseline
      await loadFromSupabase(); // Supabase overwrites (source of truth)
      initApp();
    }
    // No session → auth-overlay stays visible for the user to sign in
  }catch(e){
    console.warn('Session check error:',e);
    // Fall through: auth modal remains visible
  }
})();
</script>
